version: 2
updates:
  # JavaScript / TypeScript dependencies (monorepo root)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      # Bundle all non-major version bumps into a single PR to avoid spamming
      # the monorepo. Security updates remain separate (Dependabot default).
      minor-and-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      # Framework/auth major bumps need human review.
      - dependency-name: 'next'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'react'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'react-dom'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'next-auth'
        update-types:
          - 'version-update:semver-major'

  # GitHub Actions used by workflows
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'

  # Rust crate (packages/core-rust)
  - package-ecosystem: 'cargo'
    directory: '/packages/core-rust'
    schedule:
      interval: 'weekly'
