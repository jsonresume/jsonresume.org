name: Process Hacker News Jobs

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8.15.9'

jobs:
  # Lightweight guard: the registry Supabase project is currently unreachable
  # (see issue #332). When it is down, skip the pipeline cleanly instead of
  # burning ~60 min of Actions minutes on a run that silently inserts 0 rows.
  # This job self-heals: once Supabase resolves again, supabase_up flips to
  # 'true' and the pipeline runs as normal.
  preflight:
    name: Supabase preflight (#332)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      supabase_up: ${{ steps.check.outputs.supabase_up }}
    steps:
      - name: Check Supabase reachability
        id: check
        run: |
          URL="https://itxuhvvwryeuzuyihpkp.supabase.co/rest/v1/"
          # A live Supabase project answers with an HTTP status (e.g. 401
          # without an apikey). 000 means DNS/connect failure => project down.
          CODE=$(curl -s -o /dev/null -m 15 -w "%{http_code}" "$URL" || echo "000")
          echo "Supabase health probe returned HTTP $CODE"
          if [ "$CODE" = "000" ]; then
            echo "supabase_up=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Supabase project is unreachable (see issue #332). Skipping the HN jobs pipeline with a neutral status. This job will self-heal once the project is restored."
          else
            echo "supabase_up=true" >> "$GITHUB_OUTPUT"
          fi

  process_jobs:
    name: Process HN Jobs Pipeline
    needs: preflight
    if: needs.preflight.outputs.supabase_up == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v6
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch latest HN jobs
        id: fetch
        working-directory: apps/registry
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "::group::Fetching HN jobs"
          node scripts/jobs/import-hn-latest-thread.js 2>&1 | tee fetch.log

          # Extract summary stats
          JOBS_FETCHED=$(grep -oP 'Found \K\d+(?= job postings)' fetch.log || echo "0")
          JOBS_INSERTED=$(grep -oP '✅ \K\d+(?= jobs imported)' fetch.log || echo "0")

          echo "jobs_fetched=${JOBS_FETCHED}" >> $GITHUB_OUTPUT
          echo "jobs_inserted=${JOBS_INSERTED}" >> $GITHUB_OUTPUT
          echo "::endgroup::"
        continue-on-error: false

      - name: AI processing with GPT-5-mini
        id: process
        working-directory: apps/registry
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "::group::AI Processing"

          # Run with timeout and capture output
          timeout 3600 node scripts/jobs/parse-job-descriptions.js 2>&1 | tee process.log

          # Extract processing stats with proper regex patterns
          JOBS_TOTAL=$(grep -oP 'Found \K\d+(?= jobs)' process.log | head -1 || echo "0")
          JOBS_NEED_PROCESSING=$(grep -oP '\K\d+(?= need processing)' process.log | head -1 || echo "0")
          JOBS_PROCESSED=$(grep -oP '✅ Job #\d+' process.log | wc -l | tr -d ' ' || echo "0")
          JOBS_FAILED=$(grep -c '❌ Job #' process.log | tr -d ' ' || echo "0")

          # Ensure all values are non-empty
          JOBS_PROCESSED=${JOBS_PROCESSED:-0}
          JOBS_FAILED=${JOBS_FAILED:-0}
          JOBS_NEED_PROCESSING=${JOBS_NEED_PROCESSING:-0}

          echo "jobs_processed=${JOBS_PROCESSED}" >> $GITHUB_OUTPUT
          echo "jobs_failed=${JOBS_FAILED}" >> $GITHUB_OUTPUT
          echo "jobs_total=${JOBS_NEED_PROCESSING}" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      - name: Vectorize processed jobs
        id: vectorize
        working-directory: apps/registry
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "::group::Vectorization"

          timeout 900 node scripts/jobs/generate-embeddings-jobs.js 2>&1 | tee vectorize.log

          # Extract vectorization stats
          JOBS_VECTORIZED=$(grep -oP '✅ \K\d+(?= embeddings created)' vectorize.log || echo "0")

          echo "jobs_vectorized=${JOBS_VECTORIZED}" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      # Normalize human-typed salary strings into salary_usd/min/max columns.
      # This was never wired in — salary_usd was NULL on every row, which made
      # the min_salary filter a silent no-op (2026-07 ranking eval).
      - name: Normalize salaries
        id: salaries
        working-directory: apps/registry
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "::group::Salary normalization"
          timeout 600 node scripts/jobs/salary-normalizer/run-migration.js 2>&1 | tee salaries.log
          SALARIES_UPDATED=$(grep -oP 'Total updated: \K\d+' salaries.log || echo "0")
          echo "salaries_updated=${SALARIES_UPDATED}" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      - name: Generate workflow summary
        if: always()
        run: |
          echo "# HN Jobs Processing Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status | Metrics |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|---------|" >> $GITHUB_STEP_SUMMARY

          # Fetch stage
          if [ "${{ steps.fetch.outcome }}" == "success" ]; then
            echo "| 🔍 Fetch | ✅ Success | Fetched: ${{ steps.fetch.outputs.jobs_fetched }}, Inserted: ${{ steps.fetch.outputs.jobs_inserted }} |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.fetch.outcome }}" == "skipped" ]; then
            echo "| 🔍 Fetch | ⏭️ Skipped | User disabled fetch (processing existing jobs only) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔍 Fetch | ❌ Failed | See logs for details |" >> $GITHUB_STEP_SUMMARY
          fi

          # Process stage
          if [ "${{ steps.process.outcome }}" == "success" ]; then
            echo "| 🤖 AI Process | ✅ Success | Processed: ${{ steps.process.outputs.jobs_processed }}/${{ steps.process.outputs.jobs_total }}, Failed: ${{ steps.process.outputs.jobs_failed }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🤖 AI Process | ❌ Failed | Processed: ${{ steps.process.outputs.jobs_processed }}/${{ steps.process.outputs.jobs_total }}, Failed: ${{ steps.process.outputs.jobs_failed }} |" >> $GITHUB_STEP_SUMMARY
          fi

          # Vectorize stage
          if [ "${{ steps.vectorize.outcome }}" == "success" ]; then
            echo "| 🔢 Vectorize | ✅ Success | Vectorized: ${{ steps.vectorize.outputs.jobs_vectorized }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔢 Vectorize | ❌ Failed | Vectorized: ${{ steps.vectorize.outputs.jobs_vectorized }} |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Add failure notice if any step failed
          if [ "${{ steps.fetch.outcome }}" == "failure" ] || [ "${{ steps.process.outcome }}" == "failure" ] || [ "${{ steps.vectorize.outcome }}" == "failure" ]; then
            echo "## ⚠️ Pipeline Issues Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "One or more stages failed. Check the logs above for details." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "## 📊 Success Rate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TOTAL="${{ steps.process.outputs.jobs_total }}"
          PROCESSED="${{ steps.process.outputs.jobs_processed }}"

          # Ensure variables have default values
          TOTAL=${TOTAL:-0}
          PROCESSED=${PROCESSED:-0}

          if [ "$TOTAL" -gt 0 ] 2>/dev/null; then
            SUCCESS_RATE=$(awk "BEGIN {printf \"%.1f\", ($PROCESSED / $TOTAL) * 100}")
            echo "**AI Processing:** ${SUCCESS_RATE}% (${PROCESSED}/${TOTAL} jobs)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**AI Processing:** No jobs to process" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload logs as artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: job-processing-logs-${{ github.run_number }}
          path: |
            apps/registry/fetch.log
            apps/registry/process.log
            apps/registry/vectorize.log
          retention-days: 30

      - name: Create issue on repeated failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v9
        with:
          script: |
            // Check if there's already an open issue for pipeline failures
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automated-jobs,bug',
              per_page: 1
            });

            // Only create issue if none exists
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🚨 HN Jobs Processing Pipeline Failure',
                body: `## Pipeline Failure Alert

            The automated HN jobs processing pipeline has failed.

            **Workflow Run:** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

            **Date:** ${new Date().toISOString()}

            ### Debugging Steps

            1. Check the workflow logs for error messages
            2. Verify all required secrets are set:
               - \`OPENAI_API_KEY\`
               - \`SUPABASE_KEY\`
               - \`PINECONE_API_KEY\`
               - \`PINECONE_ENVIRONMENT\`
            3. Check API rate limits and quotas
            4. Review recent code changes that may have broken the pipeline

            This issue was automatically created by the GitHub Actions workflow.`,
                labels: ['automated-jobs', 'bug', 'critical']
              });
            }
