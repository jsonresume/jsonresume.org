name: Docs - regenerate and deploy
# Manual dispatch only while Docwright source repo is unavailable — see #478
on:
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    outputs:
      committed: ${{ steps.commit.outputs.committed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Docwright from source
        env:
          DOCWRIGHT_REF: ${{ vars.DOCWRIGHT_REF || 'main' }}
        run: |
          git clone --depth 1 --branch "$DOCWRIGHT_REF" \
            https://github.com/Traves-Theberge/Docwright.git /tmp/docwright
          cd /tmp/docwright
          npm ci --no-audit --no-fund
          npm run build
          echo "/tmp/docwright/bin" >> "$GITHUB_PATH"

      - name: Run docwright generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::warning::OPENAI_API_KEY secret not set - skipping regeneration"
            exit 0
          fi
          docwright generate --verbose

      - name: Normalise .mdx to .md (skip index.mdx)
        run: |
          shopt -s nullglob
          for f in apps/docs/content/docs/*.mdx; do
            [ "$(basename "$f")" = "index.mdx" ] && continue
            mv "$f" "${f%.mdx}.md"
          done

      - name: Commit regenerated docs
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/docs/content/docs .docwright/provenance.json .docwright/doc-structure.json || true
          if git diff --cached --quiet; then
            echo "No doc changes."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "docs: regenerate via Docwright [skip ci]"
          git push origin HEAD:master
          echo "committed=true" >> "$GITHUB_OUTPUT"

  build-and-deploy:
    needs: regenerate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout (with latest regenerated docs)
        uses: actions/checkout@v7
        with:
          ref: master

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install deps
        run: pnpm install --frozen-lockfile --filter docs... --filter registry... --filter homepage2... || pnpm install --frozen-lockfile

      - name: Build docs (Next.js static export)
        run: pnpm --filter docs build

      # No CNAME: docs are served from the GitHub Pages project URL
      # (jsonresume.github.io/jsonresume.org) behind a jsonresume.org/docs
      # rewrite in apps/homepage2.

      - name: Disable Jekyll processing
        run: touch apps/docs/out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/docs/out

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
